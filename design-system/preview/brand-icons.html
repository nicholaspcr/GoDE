<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
.grid { display:grid; grid-template-columns:repeat(8,1fr); gap:14px; }
.tile { border:1px solid hsl(var(--border)); border-radius:var(--radius-md); padding:10px; display:flex; flex-direction:column; align-items:center; gap:6px; font-size:11px; color:hsl(var(--muted-foreground)); font-family:var(--font-mono); }
.tile svg { color:hsl(var(--foreground)); }
</style></head>
<body>
<div class="grid">
  <div class="tile"><i data-lucide="play"></i>play</div>
  <div class="tile"><i data-lucide="square"></i>stop</div>
  <div class="tile"><i data-lucide="trash-2"></i>delete</div>
  <div class="tile"><i data-lucide="x"></i>cancel</div>
  <div class="tile"><i data-lucide="check"></i>done</div>
  <div class="tile"><i data-lucide="loader"></i>loading</div>
  <div class="tile"><i data-lucide="log-out"></i>sign-out</div>
  <div class="tile"><i data-lucide="plus"></i>new</div>
  <div class="tile"><i data-lucide="list"></i>list</div>
  <div class="tile"><i data-lucide="line-chart"></i>plot-2d</div>
  <div class="tile"><i data-lucide="box"></i>plot-3d</div>
  <div class="tile"><i data-lucide="download"></i>export</div>
  <div class="tile"><i data-lucide="chevron-left"></i>back</div>
  <div class="tile"><i data-lucide="chevron-right"></i>next</div>
  <div class="tile"><i data-lucide="alert-circle"></i>error</div>
  <div class="tile"><i data-lucide="settings"></i>config</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
