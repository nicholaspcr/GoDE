<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.swatch { border-radius:8px; border:1px solid hsl(var(--border)); padding:12px; min-height:72px; display:flex; flex-direction:column; justify-content:space-between; }
.row { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; }
.label { font-size:12px; font-weight:600; }
.hsl { font-family:var(--font-mono); font-size:10.5px; color:hsl(var(--muted-foreground)); }
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:hsl(var(--background));"><div class="label">background</div><div class="hsl">0 0% 100%</div></div>
  <div class="swatch" style="background:hsl(var(--foreground));color:hsl(var(--primary-foreground));"><div class="label">foreground</div><div class="hsl" style="color:hsl(210 40% 80%);">222 84% 4.9%</div></div>
  <div class="swatch" style="background:hsl(var(--secondary));"><div class="label">secondary / muted</div><div class="hsl">210 40% 96.1%</div></div>
  <div class="swatch" style="background:hsl(var(--border));"><div class="label">border / input</div><div class="hsl">214 32% 91%</div></div>
  <div class="swatch" style="background:hsl(var(--muted-foreground));color:white;"><div class="label">muted-fg</div><div class="hsl" style="color:hsl(210 40% 90%);">215 16% 47%</div></div>
</div>
</body></html>
