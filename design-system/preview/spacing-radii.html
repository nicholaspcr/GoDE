<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
  <div><div style="height:64px;border:1px solid hsl(var(--border));background:hsl(var(--secondary));border-radius:var(--radius-sm);"></div><div class="meta" style="margin-top:8px;">sm · calc(.5rem - 4px)</div></div>
  <div><div style="height:64px;border:1px solid hsl(var(--border));background:hsl(var(--secondary));border-radius:var(--radius-md);"></div><div class="meta" style="margin-top:8px;">md · calc(.5rem - 2px)</div></div>
  <div><div style="height:64px;border:1px solid hsl(var(--border));background:hsl(var(--secondary));border-radius:var(--radius-lg);"></div><div class="meta" style="margin-top:8px;">lg · .5rem (card default)</div></div>
  <div><div style="height:64px;border:1px solid hsl(var(--border));background:hsl(var(--secondary));border-radius:var(--radius-full);"></div><div class="meta" style="margin-top:8px;">full · badges, progress</div></div>
</div>
</body></html>
