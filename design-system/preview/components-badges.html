<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.badge { display:inline-flex; align-items:center; border-radius:9999px; padding:2px 10px; font-size:12px; font-weight:600; border:1px solid transparent; }
.badge-default { background:hsl(var(--primary)); color:hsl(var(--primary-foreground)); }
.badge-secondary { background:hsl(var(--secondary)); color:hsl(var(--secondary-foreground)); }
.badge-destructive { background:hsl(var(--destructive)); color:white; }
.badge-outline { color:hsl(var(--foreground)); border-color:hsl(var(--border)); }
.badge-success { background:hsl(var(--success)); color:white; }
.badge-warning { background:hsl(var(--warning)); color:#111; }
.row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.cap { font-size:12px; color:hsl(var(--muted-foreground)); margin-top:14px; margin-bottom:6px; font-weight:500;}
</style></head>
<body>
<div class="cap">VARIANTS</div>
<div class="row">
  <span class="badge badge-default">Running</span>
  <span class="badge badge-secondary">Pending</span>
  <span class="badge badge-outline">Completed</span>
  <span class="badge badge-destructive">Failed</span>
  <span class="badge badge-secondary">Cancelled</span>
  <span class="badge badge-outline">Unknown</span>
</div>
<div class="cap">SEMANTIC</div>
<div class="row">
  <span class="badge badge-success">success</span>
  <span class="badge badge-warning">warning</span>
</div>
</body></html>
