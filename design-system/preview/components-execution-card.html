<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.card { border:1px solid hsl(var(--border)); background:white; border-radius:.5rem; box-shadow:var(--shadow-sm); padding:16px; }
.top { display:flex; justify-content:space-between; align-items:flex-start; }
.title { font-weight:500; font-size:14px; }
.title a { color:inherit; text-decoration:none; }
.meta { color:hsl(var(--muted-foreground)); font-size:14px; margin-top:2px; }
.badge { display:inline-flex;align-items:center;border-radius:9999px;padding:2px 10px;font-size:12px;font-weight:600;background:hsl(var(--primary));color:white;margin-left:8px;vertical-align:middle;}
.btn { display:inline-flex;align-items:center;justify-content:center;height:36px;padding:0 12px;border-radius:6px;font-size:14px;font-weight:500;border:1px solid hsl(var(--input));background:white;cursor:pointer;margin-left:8px;}
.btn-d { background:hsl(var(--destructive));color:white;border:none;}
.grid { display:grid;grid-template-columns:repeat(5,1fr);gap:8px;font-size:13px;margin-top:12px;}
.grid span.l { color:hsl(var(--muted-foreground)); }
.track { height:10px;background:hsl(var(--secondary));border-radius:9999px;overflow:hidden;margin-top:10px;}
.fill { height:100%; background:hsl(var(--primary)); width:64%; }
</style></head>
<body>
<div class="card">
  <div class="top">
    <div>
      <div class="title"><a href="#">Execution a1f3d9c2...</a><span class="badge">Running</span></div>
      <div class="meta">Created: 04/20/26 14:32</div>
    </div>
    <div>
      <button class="btn">Cancel</button>
      <button class="btn">View</button>
    </div>
  </div>
  <div class="track"><div class="fill"></div></div>
  <div class="grid">
    <div><span class="l">Problem:</span> zdt1</div>
    <div><span class="l">Generations:</span> 100</div>
    <div><span class="l">Population:</span> 100</div>
    <div><span class="l">Dimensions:</span> 30</div>
    <div><span class="l">Objectives:</span> 2</div>
  </div>
</div>
</body></html>
