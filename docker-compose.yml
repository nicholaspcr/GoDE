services:
  postgres:
    container_name: gode-postgres
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gode-network

  redis:
    container_name: gode-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gode-network

  deserver:
    container_name: gode-server
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.compose
    environment:
      # Database configuration
      STORE_TYPE: postgres
      STORE_POSTGRESQL_DNS: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable

      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      # JWT configuration — sourced from .env.compose; rejected at startup
      # if it matches any known dev value.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      # Server configuration
      GRPC_PORT: 3030
      HTTP_PORT: 8081

      # Observability
      METRICS_ENABLED: "true"
      METRICS_TYPE: prometheus

      # Rate limiting
      RATE_LIMIT_AUTH_PER_MINUTE: 10
      RATE_LIMIT_DE_PER_USER: 20
      RATE_LIMIT_MAX_CONCURRENT_DE: 5
    ports:
      - "3030:3030"  # gRPC
      - "8081:8081"  # HTTP/REST
    networks:
      - gode-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    container_name: gode-frontend
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - deserver
    ports:
      - "3001:80"
    networks:
      - gode-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    container_name: gode-prometheus
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gode-network
    depends_on:
      - deserver

  grafana:
    container_name: gode-grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - gode-network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  gode-network:
    driver: bridge
