<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.row { font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
.track { height:16px; width:100%; border-radius:9999px; background:hsl(var(--secondary)); overflow:hidden; }
.fill { height:100%; background:hsl(var(--primary)); transition:width 300ms var(--ease); }
.sub { margin-top:6px; display:flex; justify-content:space-between; font-size:12px; color:hsl(var(--muted-foreground)); }
</style></head>
<body>
<div class="row"><span>Overall Progress</span><span>42%</span></div>
<div class="track"><div class="fill" style="width:42%"></div></div>
<div class="sub"><span>Generation 42 / 100</span><span>Execution 3 / 10</span></div>

<div class="row" style="margin-top:20px;"><span>Overall Progress</span><span>100%</span></div>
<div class="track"><div class="fill" style="width:100%"></div></div>
</body></html>
