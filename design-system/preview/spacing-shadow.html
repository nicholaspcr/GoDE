<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="background:hsl(var(--background));">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;">
  <div style="height:90px;border:1px solid hsl(var(--border));background:white;border-radius:.5rem;box-shadow:var(--shadow-none);"></div>
  <div style="height:90px;border:1px solid hsl(var(--border));background:white;border-radius:.5rem;box-shadow:var(--shadow-sm);"></div>
  <div style="height:90px;border:2px solid hsl(var(--ring));background:white;border-radius:.5rem;"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:10px;font-size:12px;color:hsl(var(--muted-foreground));">
  <div>shadow-none</div><div>shadow-sm (default)</div><div>focus ring — 2px</div>
</div>
</body></html>
